version: '3.8'

services:
  gravyclaw:
    build: .
    container_name: gravyclaw
    restart: always
    volumes:
      - ./.env:/app/.env
      - ./gravity.db:/app/gravity.db
      - ./secrets.enc.json:/app/secrets.enc.json
      - ./memory-files:/app/memory-files
      - ./logs:/app/logs
      - ./baileys_auth_info:/app/baileys_auth_info
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
