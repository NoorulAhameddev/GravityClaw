version: "3.8"

services:
  app:
    image: gravityclaw:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/live').then(r=>process.exit(r.ok?0:1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: "256M"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - app
    deploy:
      replicas: 2
      resources:
        limits:
          memory: "128M"

volumes:
  redis-data:
