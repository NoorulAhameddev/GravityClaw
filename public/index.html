<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gravity Claw - A high-performance personal AI agent ecosystem">
    <meta name="theme-color" content="#6366f1">
    <title>Gravity Claw | Agentic Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
</head>

<body>
    <!-- Skip to main content link -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <div class="layout">
        <aside class="sidebar" aria-label="Navigation">
            <div class="brand" aria-label="Gravity Claw Logo">
                <div class="logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <span>Gravity Claw</span>
            </div>

            <nav class="nav" aria-label="Main navigation">
                <button class="nav-item active" data-section="chat" aria-current="page" aria-label="Main Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                    <span>Main Chat</span>
                </button>
                <button class="nav-item" data-section="plugins" aria-label="MCP Plugins">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                    <span>MCP Plugins</span>
                </button>
                <button class="nav-item" data-section="search" aria-label="Global Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>Global Search</span>
                </button>
                <button class="nav-item" data-section="memory" aria-label="Memory Vault">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Memory Vault</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="footer-title">Connections</div>
                <div class="connection-item" aria-live="polite">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                    </svg>
                    <span>Mobile Companion</span>
                    <span class="status-dot" aria-hidden="true"></span>
                </div>

                <div class="footer-title">Last Interacted</div>
                <div id="history-list" class="history-list" aria-label="Conversation history">
                    <!-- History items injected here -->
                </div>

                <div class="footer-bottom" aria-label="Application controls">
                    <button aria-label="Settings" class="nav-item" style="border:none; background:transparent; padding:0;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <button aria-label="Help" class="nav-item" style="border:none; background:transparent; padding:0;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </button>
                    <div style="flex-grow: 1;"></div>
                    <button aria-label="Display settings" class="nav-item" style="border:none; background:transparent; padding:0;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="content" id="main-content">
            <header class="header" role="banner">
                <button class="model-selector" id="model-dropdown" aria-label="Model selector" aria-expanded="false">
                    <span>Gravity Claw Core</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>

                <div class="top-actions" role="toolbar" aria-label="Top actions">
                    <button class="tool-btn" id="notify-btn" aria-label="System Notifications" aria-pressed="false" style="position:relative;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span aria-live="polite" id="notify-badge" style="position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:var(--accent); border-radius:50%; border:2px solid var(--bg-main);"></span>
                    </button>
                    <div class="token-balance" aria-label="Node status">
                        <span style="width:6px; height:6px; background:#4caf50; border-radius:50%; margin-right:4px;" aria-hidden="true"></span>
                        <span>Active Node</span>
                    </div>
                    <div class="profile-icon" aria-label="Profile">GC</div>
                </div>
            </header>

            <div class="dashboard" id="main-dashboard" role="main">
                <h1 class="welcome-msg">What can I help with?</h1>

                <section class="chat-history" id="chat-history" aria-label="Chat history" aria-live="polite" aria-atomic="false">
                    <!-- Messages injected here -->
                </section>

                <div class="typing-indicator hidden" id="typing-indicator" aria-live="polite" role="status">
                    <div class="typing-dots" aria-label="Gravity Claw is thinking">
                        <span></span><span></span><span></span>
                    </div>
                </div>

                <div class="command-center">
                    <form id="chat-form" class="input-container" aria-label="Message form">
                        <label for="message-input" class="sr-only">Message input</label>
                        <textarea id="message-input" placeholder="Recall a memory or run a task..." rows="1" aria-label="Type a message or command"></textarea>

                        <div class="input-tools" role="toolbar" aria-label="Quick actions">
                            <button type="button" class="tool-btn" onclick="prefill('🛡️ System Check')" aria-label="System Check quick action" title="System Check">
                                🛡️
                            </button>
                            <button type="button" class="tool-btn" onclick="prefill('🧠 Recall Memory')" aria-label="Recall Memory quick action" title="Recall Memory">
                                🧠
                            </button>
                            <button type="button" class="tool-btn" onclick="prefill('📍 Mobile GPS')" aria-label="Mobile GPS quick action" title="Mobile GPS">
                                📍
                            </button>
                            <button type="button" class="tool-btn" onclick="prefill('🔍 Search Knowledge')" aria-label="Search Knowledge quick action" title="Global Search">
                                🔍
                            </button>
                            <div style="flex-grow: 1;"></div>
                            <button type="submit" class="send-btn" id="send-btn" aria-label="Send message">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification toast container -->
    <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

    <script src="app.js"></script>
</body>

</html>
