<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gravity Claw - Dashboard Management Interface">
    <meta name="theme-color" content="#6366f1">
    <title>Dashboards | Gravity Claw</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
</head>

<body>
    <!-- Skip to main content link -->
    <a href="#dashboard-main" class="skip-link">Skip to main content</a>
    
    <div class="layout">
        <aside class="sidebar" aria-label="Navigation">
            <div class="brand" aria-label="Gravity Claw Logo">
                <div class="logo" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <span>Gravity Claw</span>
            </div>

            <nav class="nav" aria-label="Dashboard navigation">
                <a href="index.html" class="nav-item" aria-label="Back to Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    </svg>
                    <span>Main Chat</span>
                </a>
                <button class="nav-item active" data-page="settings" aria-current="page" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>Settings</span>
                </button>
                <button class="nav-item" data-page="analytics" aria-label="Analytics">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    <span>Analytics</span>
                </button>
                <button class="nav-item" data-page="admin" aria-label="Admin Panel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    </svg>
                    <span>Admin Panel</span>
                </button>
                <button class="nav-item" data-page="plugins" aria-label="MCP Plugins">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                    <span>MCP Plugins</span>
                </button>
                <button class="nav-item" data-page="memory" aria-label="Memory Vault">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Memory Vault</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="footer-title">Connection Status</div>
                <div class="connection-item" aria-live="polite">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span id="ws-status">Connecting...</span>
                    <span class="status-dot" id="status-dot" aria-hidden="true"></span>
                </div>

                <div class="footer-bottom" aria-label="Application info">
                    <button id="theme-toggle" aria-label="Toggle theme" class="nav-item" style="border:none; background:transparent; padding:0;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <div style="flex-grow: 1;"></div>
                    <span style="font-size: 0.75rem; color: var(--text-muted);" aria-label="Version">v2.5.0</span>
                </div>
            </div>
        </aside>

        <main class="dashboard-content" id="dashboard-main">
            <!-- Breadcrumb Navigation -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <ol>
                    <li><a href="#/">Dashboard</a></li>
                    <li id="breadcrumb-page" aria-current="page">Settings</li>
                </ol>
            </nav>

            <!-- Dashboard Header -->
            <header class="dashboard-header" role="banner">
                <div class="header-content">
                    <h1 id="page-title">Settings</h1>
                    <p id="page-description" class="page-description">Configure your Gravity Claw preferences and integrations</p>
                </div>
                <div class="header-actions" id="header-actions">
                    <!-- Page-specific actions will be injected here -->
                </div>
            </header>

            <!-- Main Content Area -->
            <div class="dashboard-body" id="dashboard-body" role="main">
                <!-- Page content will be dynamically loaded here -->
                <div class="loading-state">
                    <svg class="spinner" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" opacity="0.25"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10" opacity="0.75"></path>
                    </svg>
                    <p>Loading dashboard...</p>
                </div>
            </div>

            <!-- Dashboard Footer -->
            <footer class="dashboard-footer">
                <div class="footer-info">
                    <span>Session: <strong id="session-id">Loading...</strong></span>
                    <span>•</span>
                    <span>Uptime: <strong id="session-uptime">00:00:00</strong></span>
                </div>
                <div class="footer-stats" id="footer-stats">
                    <!-- Quick stats will be injected here -->
                </div>
            </footer>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

    <!-- Modal Container -->
    <div id="modal-container" role="dialog" aria-modal="true" aria-hidden="true"></div>

    <!-- Scripts -->
    <script src="components/card.js"></script>
    <script src="components/stat-block.js"></script>
    <script src="components/toggle.js"></script>
    <script src="components/dropdown.js"></script>
    <script src="components/modal.js"></script>
    <script src="components/badge.js"></script>
    <script src="components/chart.js"></script>
    <script src="components/shortcuts-modal.js"></script>
    <script src="pages/settings.js"></script>
    <script src="pages/analytics.js"></script>
    <script src="pages/admin.js"></script>
    <script src="pages/plugins.js"></script>
    <script src="pages/memory.js"></script>
    <script src="dashboard-common.js"></script>
</body>

</html>
